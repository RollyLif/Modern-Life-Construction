<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400&amp;family=Outfit:wght@700;900&amp;display=swap');
    </style>
  </defs>

  <!-- Sun -->
  <circle cx="320" cy="110" r="50" fill="#F28C28" />
  
  <!-- Chimney -->
  <rect x="150" y="50" width="18" height="40" fill="#000000" />
  
  <!-- Left Roof -->
  <path d="M 60 170 L 195 40 L 330 170" fill="none" stroke="#000000" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Left Windows -->
  <rect x="175" y="110" width="16" height="16" rx="2" fill="#2D3748" />
  <rect x="199" y="110" width="16" height="16" rx="2" fill="#2D3748" />
  <rect x="175" y="134" width="16" height="16" rx="2" fill="#2D3748" />
  <rect x="199" y="134" width="16" height="16" rx="2" fill="#2D3748" />

  <!-- Right Roof -->
  <path d="M 230 160 L 320 75 L 410 160" fill="none" stroke="#000000" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Right windows -->
  <rect x="306" y="120" width="12" height="12" rx="2" fill="#2D3748" />
  <rect x="322" y="120" width="12" height="12" rx="2" fill="#2D3748" />
  <rect x="306" y="136" width="12" height="12" rx="2" fill="#2D3748" />
  <rect x="322" y="136" width="12" height="12" rx="2" fill="#2D3748" />

  <!-- Orange Swoosh Background Curve -->
  <path d="M 30 200 Q 250 280 470 200 Q 250 240 30 200 Z" fill="#F28C28" />

  <!-- Sarl Text -->
  <text x="400" y="240" font-family="'Outfit', sans-serif" font-weight="700" font-size="28" fill="#000000">Sarl</text>
  
  <!-- Main Name -->
  <text x="250" y="295" font-family="'Outfit', sans-serif" font-weight="900" font-size="58" letter-spacing="4" fill="#000000" text-anchor="middle">MODERN LIFE</text>
  
  <!-- Line -->
  <line x1="30" y1="335" x2="175" y2="335" stroke="#000000" stroke-width="5" stroke-linecap="round" />
  
  <!-- Subtext -->
  <text x="190" y="348" font-family="'Inter', sans-serif" font-weight="400" font-size="44" fill="#000000">Construction</text>
</svg>
